name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-ci.txt

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-pkgs-${{ runner.os }}-54.03.20-${{ hashFiles('platformio.ini', '.github/requirements-ci.txt') }}
          restore-keys: |
            pio-pkgs-${{ runner.os }}-54.03.20-

      - name: Cache PlatformIO build
        uses: actions/cache@v4
        with:
          path: |
            .pio
            .cache/pio
          key: pio-build-${{ runner.os }}-54.03.20-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-build-${{ runner.os }}-54.03.20-

      - name: Install PlatformIO
        run: pip install -r .github/requirements-ci.txt

      - name: Build all environments
        run: |
          pio run \
            -e gateway \
            -e gateway_fake \
            -e display_c6_13 \
            -e display_c6_147 \
            -e display_s3_169
