; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = gateway
boards_dir = boards
; Persist compiler cache outside .pio so CI/local cleans do not wipe it.
build_cache_dir = .cache/pio

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
monitor_speed = 115200

; --- Gateway: 4D Systems GEN4 ESP32-S3, CAN + ESP-NOW ---
[env:gateway]
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
build_src_filter = +<gateway/>
build_flags = -I include
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Gateway with simulated OBD telemetry (no CAN required)
[env:gateway_fake]
extends = env:gateway
build_flags =
    ${env:gateway.build_flags}
    -D GW_FAKE_OBD=1

[env:display]
framework = arduino
extra_scripts = pre:scripts/gen_build_info.py
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    lvgl/lvgl@^9.2.0
    moononournation/GFX Library for Arduino@^1.5.9

; --- Display base: ESP32-C6 family (profile selects screen size) ---
[env:display_c6]
extends = env:display
board = esp32-c6-devkitm-1
board_build.partitions = partitions/display_c6.csv
build_src_filter =
    +<display/>
    +<display/board/c6/>
    -<display/board/s3/>
build_flags =
    -I include
    -I src/display
    -D DISPLAY_DEBUG_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
lib_deps =
    lvgl/lvgl@^9.2.0
    moononournation/GFX Library for Arduino@^1.5.9

; C6 × 1.3" — ST7789 240×240, BOOT only
[env:display_c6_13]
extends = env:display_c6
board_build.flash_size = 4MB
build_flags =
    ${env:display_c6.build_flags}
    -D DISPLAY_PROFILE_C6_13
    -include display_profiles.h

; C6 × 1.47" — JD9853 172×320, touch auto-detect (AXS5106L)
[env:display_c6_147]
extends = env:display_c6
board_build.flash_size = 8MB
build_flags =
    ${env:display_c6.build_flags}
    -D DISPLAY_PROFILE_C6_147
    -include display_profiles.h

; --- Display: ESP32-S3 family × 1.69" ---
[env:display_s3_169]
extends = env:display
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
build_src_filter =
    +<display/>
    +<display/board/s3/>
    -<display/board/c6/>
build_flags =
    -I include
    -I src/display
    -D DISPLAY_PROFILE_S3_169
    -D DISPLAY_DEBUG_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
    -include display_profiles.h
lib_deps =
    lvgl/lvgl@^9.2.0
    moononournation/GFX Library for Arduino@^1.5.9
