; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = gateway
boards_dir = boards

[env]
monitor_speed = 115200

; --- Gateway: 4D Systems GEN4 ESP32-S3, CAN + ESP-NOW ---
[env:gateway]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
build_src_filter = +<gateway/>
build_flags = -I include

; --- Display: Waveshare ESP32-C6-LCD-1.3 (240×240, BOOT 切屏) ---
[env:display_c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
build_src_filter =
    +<display/>
    +<display/board/c6/>
    -<display/board/s3/>
build_flags =
    -I include
    -I src/display
    -D DISPLAY_BOARD_C6_LCD_13
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
    -include config_display_c6.h
lib_deps =
    lvgl/lvgl@^9.2.0

; --- Display: Waveshare ESP32-S3-Touch-LCD-1.69 (触摸 + IMU) ---
[env:display_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter =
    +<display/>
    +<display/board/s3/>
    -<display/board/c6/>
build_flags =
    -I include
    -I src/display
    -D DISPLAY_BOARD_S3_TOUCH_169
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_PATH=\"${PROJECT_DIR}/include/lv_conf.h\"
    -include config_display_s3.h
lib_deps =
    lvgl/lvgl@^9.2.0
